on:
  push:
    tags:
      - '*.*.*'

name: Publish Release

jobs:
  build:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PKGCLD_REPO_URL: ${{ vars.PKGCLD_REPO_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Build with Gradle
        run: ./gradlew build --parallel

      - name: Get Release Version
        id: get_version
        run: VERSION=$(./gradlew currentVersion -q -Prelease.quiet) && echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Release and Upload Assets
        id: create_release
        run: |
          gh release create \
            --generate-notes \
            --title 'Release ${{ steps.get_version.outputs.VERSION }}' \
            ${{ github.ref_name }} \
            ./command/build/libs/command-${{ steps.get_version.outputs.VERSION }}.zip#command-${{ steps.get_version.outputs.VERSION }}.zip \
            ./file/build/libs/file-${{ steps.get_version.outputs.VERSION }}.zip#file-${{ steps.get_version.outputs.VERSION }}.zip \
            ./local-script/build/libs/local-script-${{ steps.get_version.outputs.VERSION }}.zip#local-script-${{ steps.get_version.outputs.VERSION }}.zip \
            ./waitfor/build/libs/waitfor-${{ steps.get_version.outputs.VERSION }}.zip#waitfor-${{ steps.get_version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PackageCloud
        run: |
          if [ -z "$PKGCLD_WRITE_TOKEN" ]; then
            echo "::error::PKGCLD_WRITE_TOKEN must be set to publish to PackageCloud"
            exit 1
          fi
          ./gradlew publishAllPublicationsToPackageCloudRepository
        env:
          PKGCLD_WRITE_TOKEN: ${{ secrets.PKGCLD_WRITE_TOKEN }}
      - name: Sign and upload GPG signatures to PackageCloud
        run: |
          set -e
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          echo "$SIGNING_KEY_B64" | base64 -d | gpg --batch --yes --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/ {print $5; exit}')

          sign_and_upload() {
            local FILE="$1"
            local REMOTE_NAME="$2"
            gpg --batch --yes --pinentry-mode loopback --passphrase "$SIGNING_PASSWORD" --default-key "$KEY_ID" --detach-sign --armor "$FILE"
            curl -sf -H "Authorization: Bearer ${PKGCLD_WRITE_TOKEN}" \
              -X PUT --data-binary "@${FILE}.asc" \
              "${BASE_URL}/${REMOTE_NAME}.asc"
          }

          # Each subproject (command, file, local-script, waitfor) publishes its own
          # mavenZip publication under org/rundeck/plugins/<module>/, artifactId == module name.
          for MODULE in command file local-script waitfor; do
            BASE_URL="${PKGCLD_REPO_URL:-https://packagecloud.io/pagerduty/rundeck-plugins/maven2}/org/rundeck/plugins/${MODULE}/${VERSION}"
            sign_and_upload "${MODULE}/build/libs/${MODULE}-${VERSION}.zip" "${MODULE}-${VERSION}.jar"
            sign_and_upload "${MODULE}/build/publications/mavenZip/pom-default.xml" "${MODULE}-${VERSION}.pom"
          done
        env:
          SIGNING_KEY_B64: ${{ secrets.SIGNING_KEY_B64 }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          PKGCLD_WRITE_TOKEN: ${{ secrets.PKGCLD_WRITE_TOKEN }}
